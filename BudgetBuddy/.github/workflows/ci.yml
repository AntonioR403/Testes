name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: budgetbuddy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/budgetbuddy
      NEXTAUTH_SECRET: test-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          cd BudgetBuddy
          npm install
      - name: Prisma migrate
        run: |
          cd BudgetBuddy
          npm run db:migrate
      - name: Lint
        run: |
          cd BudgetBuddy
          npm run lint
      - name: Typecheck
        run: |
          cd BudgetBuddy
          npm run typecheck
      - name: Unit/Integration tests
        run: |
          cd BudgetBuddy
          npm run test
      - name: Install Playwright Browsers
        run: |
          cd BudgetBuddy
          npx playwright install --with-deps
      - name: E2E
        run: |
          cd BudgetBuddy
          npm run test:e2e
