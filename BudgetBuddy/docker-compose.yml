services:
  postgres:
    image: postgres:16
    container_name: budgetbuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: budgetbuddy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - budgetbuddy_pgdata:/var/lib/postgresql/data

volumes:
  budgetbuddy_pgdata:
